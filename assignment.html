<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCBI Web Tool</title>
    <link rel="stylesheet" href="assignment.css">
</head>

<body>

<header>
    <h1>NCBI Access Portal</h1>
    <p>Explore Bioinformatics Tools</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Gene</a>
    <a href="#">BLAST</a>
    <a href="#">PubMed</a>
</nav>

<main>
    <section class="search-box">
        <h2>Search NCBI Database</h2>
        <input type="text" placeholder="Enter gene / protein name">
        <button>Search</button>
    </section>

    <section class="tools">
        <div class="card">
            <h3>Gene Database</h3>
            <p>Access gene-related information</p>
        </div>

        <div class="card">
            <h3>BLAST Tool</h3>
            <p>Compare biological sequences</p>
        </div>

        <div class="card">
            <h3>PubMed</h3>
            <p>Search research articles</p>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 NCBI Web Tool Project</p>
</footer>

</body>
</html>
